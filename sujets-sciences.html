const PROXY = 'https://script.google.com/macros/s/AKfycbxxQCRDZvKAb9fuXkDslK7LYMXjcIrIi-_EpA8DWT1-tTelSpYcMxPkiSPG5bKheLTY/exec';

function getUserId() {
  var id = localStorage.getItem('user_id');
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : 'user_' + Date.now());
    localStorage.setItem('user_id', id);
  }
  return id;
}
function getSessionId() {
  var sid = sessionStorage.getItem('session_id');
  if (!sid) { sid = 'sess_' + Date.now(); sessionStorage.setItem('session_id', sid); }
  return sid;
}
function isPaid() { return false; }
function getJoursRestantsEssai() { return 3; }

async function callIA(prompt, system) {
  var timeout = new Promise(function(_, reject) {
    setTimeout(function() { reject(new Error('Timeout 45s')); }, 45000);
  });
  var payload = JSON.stringify({
    userId: getUserId(),
    action: 'correction_ia',
    prompt: prompt,
    system: system,
    estPayant: isPaid(),
    sessionId: getSessionId(),
    joursRestantsEssai: getJoursRestantsEssai(),
    source: document.title,
    matiere: 'sciences'
  });
  var req = fetch(PROXY, {
    method: 'POST',
    body: new URLSearchParams({ data: payload })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success && d.content) return d.content;
    throw new Error(d.error || 'Erreur API');
  });
  return Promise.race([req, timeout]);
}

function safeJSON(t) {
  try { return JSON.parse(t.replace(/```json|```/g, '').trim()); }
  catch(e) { return null; }
}

        {texte:'Q4 (2 pts) — Identifier les actions mécaniques subies par le taxi posé sur un sol horizontal et nommer les forces.',rep:'1) Poids P (force gravitationnelle vers le bas, centre de gravité). 2) Réaction du sol R (force normale vers le haut, point de contact). Équilibre : P = R.',pts:25},
        {texte:'Q5 (3 pts) — Indiquer la relation pour calculer le poids P. Nommer et donner les unités de m et g.\n(P = m/g / P = m² × g / P = m × g)',rep:'P = m × g. m = masse en kilogrammes (kg). g = intensité de la pesanteur en newtons par kilogramme (N/kg).',pts:25},

        {texte:'Q3 — À l\'aide des documents 1 et 2, proposer un protocole pour vérifier la présence de l\'ion Ca²⁺ dans l\'eau de mer.',rep:'Protocole : ajouter quelques gouttes d\'oxalate d\'ammonium (ou autre réactif du document 2) à l\'échantillon d\'eau de mer → observer la formation d\'un précipité blanc en cas de présence de Ca²⁺.',pts:25},

        {texte:'Q2 (6 pts) — À partir du document 2, identifier et recopier les DEUX réponses correctes :\na. Nb cas paludisme plus élevé en 2005 qu\'en 1980 au Panama\nb. Au Panama, passage d\'environ 1000 à 7000 cas au début des années 2000\nc. Au Costa Rica, passage d\'environ 1000 à 7000 cas au début des années 1990\nd. Augmentation très importante des cas au Panama AVANT le Costa Rica',rep:'Propositions correctes : c et d. c : Au Costa Rica, augmentation à environ 7000 cas au début des années 1990. d : La forte augmentation a eu lieu au Panama avant le Costa Rica (d\'après le graphique du document 2).',pts:25},

    exos:[
      {type:'svt',label:'SVT — Doryphores et pommes de terre (25 pts)',pts:25,questions:[
        {texte:'Q1 (4 pts) — À partir du document 1, recopier le numéro de la proposition exacte :\nP1 : diminution du nombre des tubercules\nP2 : augmentation du nombre des tubercules\nP3 : diminution de la masse moyenne des tubercules\nP4 : augmentation de la masse moyenne des tubercules',rep:'Proposition 3 : les doryphores mangent les feuilles → diminution de la photosynthèse → moins de sucres produits → diminution de la masse moyenne des tubercules.',pts:25},
        {texte:'Q2a (12 pts) — Parmi les expériences A, B, C, indiquer laquelle teste l\'hypothèse : « plus la surface totale des feuilles est petite, plus la masse moyenne des tubercules est faible ». Expliquer le choix.',rep:'L\'expérience qui fait varier uniquement la surface foliaire (en enlevant des feuilles) tout en gardant les autres conditions identiques. Ex : expérience B (selon le tableau). Justification : seule la variable « surface des feuilles » change → résultat interprétable.',pts:25},
        {texte:'Q2b — Expliquer l\'intérêt d\'avoir utilisé plusieurs plants (lot de 10) par expérience.',rep:'Utiliser plusieurs plants → obtenir une moyenne fiable → limiter l\'influence des variations individuelles → résultats plus représentatifs et reproductibles.',pts:25},
        {texte:'Q3 (9 pts) — À l\'aide des documents 1, 2 et 3, expliquer pourquoi la présence de nombreux doryphores modifie la masse moyenne des tubercules.',rep:'Doryphores mangent les feuilles (doc.1) → réduction de la surface foliaire → diminution de la photosynthèse (doc.2 : moins de lumière captée) → moins de glucose produit → moins de mise en réserve dans les tubercules (doc.3) → masse moyenne des tubercules diminue.',pts:25}
      ]},
      {type:'pc',label:'PC — Mission Alpha ISS (25 pts)',pts:25,questions:[
        {texte:'Q1 (2 pts) — Citer deux avantages des matériaux innovants présentés (mousses réutilisables, biodégradables ou comestibles).',rep:'1) Réduction des déchets à bord de l\'ISS. 2) Réutilisables → économie de ressources. 3) Biodégradables/comestibles → pas de stockage de déchets dangereux.',pts:25},
        {texte:'Q2a (6 pts) — Indiquer si le dioxygène est un atome ou une molécule. Donner un argument.',rep:'Molécule. Argument : le dioxygène O₂ est composé de 2 atomes d\'oxygène liés → c\'est une molécule (assemblage d\'au moins 2 atomes).',pts:25},
        {texte:'Q2b — 2H₂O → 2H₂ + O₂. Choisir la proposition correcte :\nP1 : 2kg eau → 2kg H₂ + 1kg O₂\nP2 : 2kg eau → 0,22kg H₂ + 1,78kg O₂\nP3 : 2kg H₂ + 1kg O₂ → 2kg eau',rep:'P2. Justification : conservation de la masse → 2kg eau = 0,22kg H₂ + 1,78kg O₂. Les masses se conservent lors d\'une réaction chimique. P1 est fausse (masse totale serait 3kg ≠ 2kg). P3 est l\'inverse de la réaction.',pts:25},
        {texte:'Q3a (9 pts) — Classer dans l\'ordre les 5 étapes de la démarche expérimentale pour vérifier la masse volumique du cylindre d\'aluminium.',rep:'Étapes dans l\'ordre : 1) Mesurer la masse du cylindre (balance). 2) Mesurer le volume (eau déplacée ou calcul géométrique). 3) Calculer ρ = m/V. 4) Comparer avec la valeur de référence (2,7 g/mL). 5) Conclure.',pts:25},
        {texte:'Q3b — Vérifier que la masse volumique du cylindre est celle de l\'aluminium (2,7 g/mL). Détailler les calculs.',rep:'ρ = m/V. Substituer les mesures de l\'expérience. Si résultat ≈ 2,7 g/mL → c\'est de l\'aluminium.',pts:25},

        {texte:'Q4a (8 pts) — Choisir 2 adjectifs et caractériser le mouvement de l\'ISS. Justifier.\n(Rectiligne / Circulaire / Accéléré / Uniforme / Ralenti)',rep:'Circulaire et uniforme. Justification : l\'ISS suit une orbite (trajectoire circulaire) à vitesse constante (~28000 km/h) → mouvement circulaire uniforme.',pts:25},
        {texte:'Q4b — Expliquer la signification de « 16 levers de Soleil » par calcul. (L\'ISS parcourt 42700 km/tour à 28000 km/h)',rep:'Durée d\'un tour = 42700/28000 ≈ 1,525 h ≈ 1h31min. En 24h : 24/1,525 ≈ 15,7 ≈ 16 tours. L\'ISS voit donc 16 levers de Soleil par jour.',pts:25}
      ]}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildGrid() {
  var html = '';
  SUJETS.forEach(function(s, idx) {
    html += '<div class="card" onclick="ouvrirSujet(' + idx + ')">'
      + '<div class="card-top"><span class="card-num">Sujet ' + s.id + '</span><span class="badge">' + s.annee + '</span></div>'
      + '<div class="card-titre">' + esc(s.titre) + '</div>'
      + '<div class="card-meta">' + esc(s.session) + '</div>'
      + (s.pdf ? '<a class="card-pdf" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">📄 Sujet officiel PDF</a>' : '')
      + '</div>';
  });
  document.getElementById('grid').innerHTML = html;
}

function ouvrirSujet(idx) {
  var s = SUJETS[idx];
  document.getElementById('svTitre').innerHTML = 'DNB ' + s.annee + ' — ' + s.session;
  document.getElementById('svSub').textContent = s.titre;
  document.getElementById('svDl').href = s.pdf;
  document.getElementById('btnPdfExport').onclick = function() { exportPDF(idx); };

  var html = '';
  s.exos.forEach(function(exo, ei) {
    var cls = exo.type === 'svt' ? 'badge-svt' : exo.type === 'pc' ? 'badge-pc' : 'badge-techno';
    var label = exo.type === 'svt' ? 'SVT' : exo.type === 'pc' ? 'Physique-Chimie' : 'Technologie';
    html += '<div class="exo">'
      + '<div class="exo-head"><span class="exo-badge ' + cls + '">' + label + '</span><span class="exo-label">' + esc(exo.label) + '</span></div>';
    exo.questions.forEach(function(q, qi) {
      var qid = 'q_' + idx + '_' + ei + '_' + qi;
      html += '<div class="question">'
        + '<div class="q-texte">' + esc(q.texte) + '</div>'
        + '<textarea class="answer-area" id="ans_' + qid + '" placeholder="Écris ta réponse ici..."></textarea>'
        + '<button class="btn-corriger" onclick="corriger(' + idx + ',' + ei + ',' + qi + ',\"' + qid + '\")">✦ Corriger avec IA</button>'
        + '<div class="panel" id="panel_' + qid + '"></div>'
        + '</div>';
    });
    html += '</div>';
  });

  document.getElementById('svContent').innerHTML = html;
  document.getElementById('landing').style.display = 'none';
  var sv = document.getElementById('sujetView');
  sv.style.display = 'block';
  sv.classList.add('active');
  window.scrollTo(0,0);
}

function retour() {
  document.getElementById('sujetView').style.display = 'none';
  document.getElementById('sujetView').classList.remove('active');
  document.getElementById('landing').style.display = 'block';
  window.scrollTo(0,0);
}


function badge(val) {
  var ok = (val === 'Oui' || val === 'OK');
  var partiel = (val === 'Partiel');
  var bg  = ok ? 'rgba(94,207,177,.15)' : partiel ? 'rgba(245,166,35,.15)' : 'rgba(232,122,122,.15)';
  var col = ok ? '#5ecfb1' : partiel ? '#f5a623' : '#e87a7a';
  var icon = ok ? '✓' : partiel ? '◑' : '✗';
  return '<span style="background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">'+icon+' '+esc(val)+'</span>';
}

async function corriger(sIdx, ei, qi, qid) {
  var s   = SUJETS[sIdx];
  var exo = s.exos[ei];
  var q   = exo.questions[qi];
  var ans = document.getElementById('ans_' + qid).value.trim();
  if (!ans) { alert("Écris ta réponse d'abord !"); return; }

  var panel = document.getElementById('panel_' + qid);
  var btn   = document.querySelector('[onclick*="' + qid + '"]');
  panel.classList.add('show');
  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction IA en cours...</div>';
  if (btn) btn.disabled = true;

  var disc = exo.type === 'svt' ? 'SVT (Sciences de la Vie et de la Terre)'
           : exo.type === 'pc'  ? 'Physique-Chimie'
           : 'Technologie';
  var qTexteClean = q.texte.split('\n').join(' ').substring(0,300);
  var pts = q.pts_question || exo.pts;
  var matchPts = (q.texte||'').match(/\((\d+(?:[,.]\d+)?)\s*pts?\)/i);
  if (!q.pts_question && matchPts) pts = parseFloat(matchPts[1].replace(',','.'));

  var methodeSpec = exo.type === 'pc'
    ? 'formule avant application, valeurs avec unites, calcul detaille, conversion, conclusion'
    : exo.type === 'svt'
    ? 'extraction documents, vocabulaire scientifique precis, raisonnement obs-hypothese-conclusion'
    : 'besoin identifie, chaine energie/information, justification choix techniques';

  var system = 'Tu es correcteur expert DNB SCIENCES ' + disc + ', exigeant et bienveillant.'
    + ' Sujet : ' + s.titre + ', session ' + s.annee + '. Exercice : ' + exo.label + '.'
    + ' METHODE ' + disc + ' : ' + methodeSpec + '.'
    + ' BAREME UNIVERSEL pour cette question (' + pts + ' pts) :'
    + ' 1/3 BONNE REPONSE (resultat/element correct) — 1/3 REDACTION (phrase complete, vocabulaire precis) — 1/3 JUSTIFICATION (demarche, formule, etapes visibles).'
    + ' Reponse sans justif = 1/3 max. Reponse sans redaction = 2/3 max. Justif sans resultat = 1/3. Tout correct = max.'
    + ' Reponds UNIQUEMENT en JSON valide sans markdown :'
    + ' {"note":X,"sur":' + pts + ',"cours_su":"Oui/Partiel/Non","transfert":"Oui/Partiel/Non","methode":"Oui/Partiel/Non",'
    + '"detail_bareme":"reponse X/' + Math.round(pts/3*10)/10 + ' - redaction X/' + Math.round(pts/3*10)/10 + ' - justification X/' + Math.round(pts/3*10)/10 + '",'
    + '"correction_experte":"correction modele complete avec formules, calculs, unites, conclusion.",'
    + '"analyse_eleve":"ce qui est juste, ce qui manque, erreurs identifiees.",'
    + '"pistes":"2-3 conseils precis."}';

  var prompt = 'Question : ' + qTexteClean
    + '\nCorrection attendue : ' + q.rep.substring(0,300)
    + '\nRéponse élève : ' + ans;

  try {
    var txt  = await callIA(prompt, system);
    var json = safeJSON(txt);

    if (!STORE[s.id]) STORE[s.id] = [];
    STORE[s.id].push({ exo: exo.label, qi: qi+1, question: q.texte.substring(0,80),
      reponseEleve: ans, correctionIA: json ? (json.analyse_eleve||json.commentaire) : txt,
      correctionOff: q.rep, pts: pts, note: json ? json.note : null });
    try { localStorage.setItem(_STORE_KEY, JSON.stringify(STORE)); } catch(e2) {}

    panel.innerHTML = '<div class="corr-ia">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">'
      +   '<div class="corr-note">✓ ' + (json ? json.note : '?') + ' / ' + pts + '</div>'
      +   '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'
      +     '<span style="font-size:10px;color:#9090a8;">Cours</span>' + badge(json ? json.cours_su : '?')
      +     '<span style="font-size:10px;color:#9090a8;margin-left:6px;">Transfert</span>' + badge(json ? json.transfert : '?')
      +     '<span style="font-size:10px;color:#9090a8;margin-left:6px;">Méthode</span>' + badge(json ? json.methode : '?')
      +   '</div>'
      + '</div>'
      + (json && json.detail_bareme ? '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#f5a623;font-weight:700;text-transform:uppercase;margin-bottom:5px;">📊 Barème 1/3</div><div style="background:rgba(245,166,35,.06);border-left:3px solid #f5a623;padding:8px 13px;font-size:12px;font-family:monospace;line-height:1.8;">' + esc(json.detail_bareme) + '</div></div>' : '')
      + '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#5eaacf;font-weight:700;text-transform:uppercase;margin-bottom:5px;">📝 Correction modèle</div><div style="background:rgba(94,170,207,.06);border-left:3px solid #5eaacf;padding:10px 13px;font-size:13px;line-height:1.7;">' + esc(json ? (json.correction_experte||json.commentaire||'') : txt) + '</div></div>'
      + '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#5ecfb1;font-weight:700;text-transform:uppercase;margin-bottom:5px;">🔍 Analyse</div><div class="corr-txt" style="font-size:13px;">' + esc(json ? (json.analyse_eleve||json.commentaire||txt) : txt) + '</div></div>'
      + (json && json.pistes ? '<div><div style="font-size:10px;color:#9090a8;font-weight:700;text-transform:uppercase;margin-bottom:5px;">🎯 Pour progresser</div><div class="corr-conseil" style="font-size:13px;">' + esc(json.pistes) + '</div></div>' : '')
      + '</div>'
      + '<div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>' + esc(q.rep) + '</div>'
      + '<button class="btn-copy" onclick="copier(this)">📋 Copier</button>';

  } catch(err) {
    panel.innerHTML = '<div style="color:#e87a7a">❌ Erreur : ' + err.message + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function copier(btn) {
  try {
    await navigator.clipboard.writeText(btn.parentElement.innerText);
    btn.textContent = '✓ Copié';
    setTimeout(function() { btn.textContent = '📋 Copier'; }, 2000);
  } catch(e) {}
}

function exportPDF(sIdx) {
  var s = SUJETS[sIdx];
  var data = STORE[s.id];
  if (!data || !data.length) { alert("Corrige au moins une question d'abord."); return; }
  var totalObt = 0, totalMax = 0;
  data.forEach(function(c) {
    html += '<h2>' + c.exo + ' — Q' + c.qi + (c.note!=null?' ('+c.note+'/'+c.pts+')':'') + '</h2>'
      + '<div class="q"><strong>Question :</strong> ' + c.question + '</div>'
      + '<div class="rep-eleve"><strong>✏️ Réponse élève :</strong><br>' + (c.reponseEleve || '—') + '</div>'
      + (c.cours_su ? '<div class="rep-detail">📚 <strong>Cours :</strong> ' + c.cours_su + '</div>' : '')
      + (c.methode  ? '<div class="rep-detail">✏️ <strong>Méthode :</strong> ' + c.methode + '</div>' : '')
      + '<div class="rep-ia">🤖 <strong>Analyse IA :</strong><br>' + c.correctionIA + '</div>'
      + (c.pistes   ? '<div class="rep-pistes">🎯 <strong>Pistes :</strong> ' + c.pistes + '</div>' : '')
      + '<div class="rep-off">📖 <strong>Correction officielle :</strong><br>' + c.correctionOff + '</div>';
  });
  var html = '<html><head><meta charset="UTF-8"><style>'
    + 'body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:2rem;}'
    + 'h1{font-size:16px;border-bottom:2px solid #5eaacf;color:#2a6a8a;padding-bottom:6px;margin-bottom:16px;}'
    + 'h2{font-size:13px;margin-top:1.2rem;border-left:4px solid #5eaacf;padding-left:8px;}'
    + '.q{margin-bottom:8px;font-style:italic;color:#555;}'
    + '.rep-ia{background:#e6f4f9;border:1px solid #5eaacf;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-eleve{background:#f0f0ff;border:1px solid #9090c8;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-detail{background:#f9f9f0;border:1px solid #c8c890;border-radius:6px;padding:6px 10px;margin:4px 0;font-size:12px;}'
    + '.rep-pistes{background:#fff8e6;border:1px solid #f5a623;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-off{background:#e6f9ee;border:1px solid #34c76b;border-radius:6px;padding:8px;margin:6px 0;font-size:12px;}'
    + '.score{font-size:18px;font-weight:bold;color:#2a6a8a;margin:16px 0;}'
    + '</style></head><body>'
    + '<h1>🔬 Corrections Sciences — ' + s.annee + ' ' + s.session + '</h1>'
    + '<div class="score">Score : ' + totalObt.toFixed(1) + ' / ' + totalMax + '</div>';
  data.forEach(function(c) {
    html += '<h2>' + c.exo + ' — Q' + c.qi + (c.note!=null?' ('+c.note+'/'+c.pts+')':'') + '</h2>'
      + '<div class="q">' + c.question + '</div>'
      + '<div class="rep-ia">🤖 ' + c.correctionIA + '</div>'
      + '<div class="rep-off">✅ ' + c.correctionOff + '</div>';
  });
  html += '</body></html>';
    var blob = new Blob([html], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'corrections_' + s.annee + '_' + s.session.replace(/[^a-z0-9]/gi,'_') + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
