const PROXY = 'https://script.google.com/macros/s/AKfycbxxQCRDZvKAb9fuXkDslK7LYMXjcIrIi-_EpA8DWT1-tTelSpYcMxPkiSPG5bKheLTY/exec';

function getUserId() {
  var id = localStorage.getItem('user_id');
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : 'user_' + Date.now());
    localStorage.setItem('user_id', id);
  }
  return id;
}
function getSessionId() {
  var sid = sessionStorage.getItem('session_id');
  if (!sid) { sid = 'sess_' + Date.now(); sessionStorage.setItem('session_id', sid); }
  return sid;
}
function isPaid() { return false; }
function getJoursRestantsEssai() { return 3; }

async function callIA(prompt, system) {
  var timeout = new Promise(function(_, reject) {
    setTimeout(function() { reject(new Error('Timeout 45s')); }, 45000);
  });
  var payload = JSON.stringify({
    userId: getUserId(),
    action: 'correction_ia',
    prompt: prompt,
    system: system,
    estPayant: isPaid(),
    sessionId: getSessionId(),
    joursRestantsEssai: getJoursRestantsEssai(),
    source: document.title,
    matiere: 'maths'
  });
  var req = fetch(PROXY, {
    method: 'POST',
    body: new URLSearchParams({ data: payload })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success && d.content) return d.content;
    throw new Error(d.error || 'Erreur API');
  });
  return Promise.race([req, timeout]);
}

function safeJSON(t) {
  try { return JSON.parse(t.replace(/```json|```/g, '').trim()); }
  catch(e) { return null; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildGrid() {
  var html = '';
  SUJETS.forEach(function(s, idx) {
    html += '<div class="card" onclick="ouvrirSujet(' + idx + ')">'
      + '<div class="card-top"><span class="card-num">Sujet ' + s.id + '</span><span class="badge">' + s.annee + '</span></div>'
      + '<div class="card-titre">' + esc(s.titre) + '</div>'

      + '<a class="card-pdf" href="' + s.pdf + '" target="_blank" onclick="event.stopPropagation()">📄 Sujet officiel PDF</a>'
      + '</div>';
  });
  document.getElementById('grid').innerHTML = html;
}

  document.getElementById('sujetView').style.display = 'none';
  document.getElementById('sujetView').classList.remove('active');

function badge(val) {
  var ok = (val === 'Oui' || val === 'OK');
  var partiel = (val === 'Partiel');
  var bg  = ok ? 'rgba(94,207,177,.15)' : partiel ? 'rgba(245,166,35,.15)' : 'rgba(232,122,122,.15)';
  var col = ok ? '#5ecfb1' : partiel ? '#f5a623' : '#e87a7a';
  var icon = ok ? '✓' : partiel ? '◑' : '✗';
  return '<span style="background:'+bg+';color:'+col+';border:1px solid '+col+';border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;">'+icon+' '+esc(val)+'</span>';
}

async function corriger(sIdx, ei, qi, qid) {
  var s = SUJETS[sIdx];
  var exo = s.exos[ei];
  var q = exo.questions[qi];
  var ans = document.getElementById('ans_' + qid).value.trim();
  if (!ans) { alert("Écris ta réponse d'abord !"); return; }

  var panel = document.getElementById('panel_' + qid);
  var btn = document.getElementById('panel_' + qid).previousElementSibling.querySelector('.btn-corriger');
  panel.classList.add('show');
  panel.innerHTML = '<div class="loading"><span class="dot"></span>Correction en cours...</div>';
  if (btn) btn.disabled = true;

  // Priorité : pts_question explicite > pts extrait du texte > estimation
  var pts = q.pts_question || exo.pts;
  var ptsExoTotal = exo.pts;
  var nbQuestionsProbleme = exo.questions ? exo.questions.length : 1;
  if (!q.pts_question) {
    var matchPts = (q.texte || '').match(/\((\d+(?:[,.]\d+)?)\s*pts?\)/i);
    if (matchPts) { pts = parseFloat(matchPts[1].replace(',', '.')); }
    else { pts = exo.pts; } // pts total de l'exercice — DeepSeek estimera la part
  }
  var ptsParQuestion = exo.type === 'auto' ? (exo.pts / exo.questions.length) : pts;

  // ============================================================
  // PARTIE 1 : AUTOMATISMES → correction par comparaison (PAS D'IA)
  // ============================================================
  if (exo.type === 'auto') {
    var reponseEleve = ans.trim().toLowerCase();
    var reponseAttendue = q.rep.toLowerCase();
    
    // Nettoyer les réponses
    reponseEleve = reponseEleve.replace(/[^a-z0-9\/\+\-\*\.\(\)]/g, '');
    reponseAttendue = reponseAttendue.replace(/[^a-z0-9\/\+\-\*\.\(\)]/g, '');
    
    var estCorrect = (reponseEleve === reponseAttendue);
    var note = estCorrect ? ptsParQuestion : 0;
    
    if (estCorrect) {
      panel.innerHTML = '<div class="corr-ia">'
        + '<div class="corr-note">✓ ' + note + ' / ' + ptsParQuestion + '</div>'
        + '<div class="corr-txt" style="color:#5ecfb1">✅ Réponse correcte !</div>'
        + '</div>'
        + '<div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>' + esc(q.rep) + '</div>';
    } else {
      panel.innerHTML = '<div class="corr-ia">'
        + '<div class="corr-note">✗ 0 / ' + ptsParQuestion + '</div>'
        + '<div class="corr-txt" style="color:#e87a7a">❌ Réponse incorrecte.</div>'
        + '</div>'
        + '<div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>' + esc(q.rep) + '</div>';
    }
    
    // Sauvegarde
    if (!STORE[s.id]) STORE[s.id] = [];
    STORE[s.id].push({
      exo: exo.label,
      qi: qi + 1,
      question: q.texte.substring(0,80),
      reponseEleve: ans,
      correctionIA: estCorrect ? "Correct" : "Incorrect",
      correctionOff: q.rep,
      pts: ptsParQuestion,
      note: note
    });
    try { localStorage.setItem(_STORE_KEY, JSON.stringify(STORE)); } catch(e) {}
    
    if (btn) btn.disabled = false;
    return;
  }
  
  // ============================================================
  // PARTIE 2 : PROBLÈMES → correction par IA (DeepSeek)
  // ============================================================
  var qTexteClean = q.texte.replace(/[\n\r]/g,' ').substring(0,300);
  
  var system = 'Tu es correcteur DNB MATHEMATIQUES, exigeant comme un vrai correcteur officiel.'
    + ' Sujet : ' + s.titre + ', session ' + s.annee + '. Exercice : ' + exo.label + '.'
    + ' BAREME : exercice = ' + ptsExoTotal + ' pts sur ' + nbQuestionsProbleme + ' questions.'
    + (q.pts_question ? ' Cette question vaut EXACTEMENT ' + pts + ' pt(s).' : ' Estime la valeur de cette sous-question : repartis ' + ptsExoTotal + ' pts equitablement sur ' + nbQuestionsProbleme + ' questions, puis ajuste selon la complexite.')
    + ' BAREME UNIVERSEL pour chaque point : 1/3 BONNE REPONSE — 1/3 REDACTION — 1/3 JUSTIFICATION.'
    + ' REGLES STRICTES DNB :'
    + ' R1. Resultat juste SANS justification = 1/3 max (demarche obligatoire au DNB).'
    + ' R2. Demarche juste AVEC resultat faux = 2/3 des points.'
    + ' R3. Theoreme non nomme = -0.5pt meme si calcul correct.'
    + ' R4. Unite absente = -0.5pt. Conclusion absente = -0.5pt.'
    + ' R5. Note maximale UNIQUEMENT si reponse + redaction + justification tous corrects.'
    + ' Decompose dans detail_bareme : reponse X/3 - redaction X/3 - justification X/3.'
    + ' Reponds UNIQUEMENT en JSON valide sans markdown :'
    + ' {"note":X,"sur":' + pts + ',"cours_su":"Oui/Partiel/Non","transfert":"Oui/Partiel/Non","methode":"Oui/Partiel/Non",'
    + '"detail_bareme":"reponse X/3 - redaction X/3 - justification X/3",'
    + '"correction_experte":"resolution complete theoremes nommes calculs unites conclusion.",'
    + '"analyse_eleve":"ce qui est juste ce qui manque erreurs.",'
    + '"pistes":"2-3 conseils precis."}';

  var prompt = 'Question : ' + qTexteClean
    + '\nCorrection attendue : ' + q.rep.substring(0,300)
    + '\nRéponse élève : ' + ans;

  try {
    var txt = await callIA(prompt, system);
    var json = safeJSON(txt);

    if (!STORE[s.id]) STORE[s.id] = [];
    STORE[s.id].push({
      exo: exo.label,
      qi: qi + 1,
      question: q.texte.substring(0,80),
      reponseEleve: ans,
      cours_su: json ? json.cours_su : '',
      methode: json ? json.methode : '',
      pistes: json ? json.pistes : '',
      correctionIA: json ? json.commentaire : txt,
      correctionOff: q.rep,
      pts: pts,
      note: json ? json.note : null
    });
    try { localStorage.setItem(_STORE_KEY, JSON.stringify(STORE)); } catch(e) {}

    if (typeof trackAction === 'function') {
      trackAction('correction_ia', 'maths', 'question', json?.note || null);
    }

    panel.innerHTML = '<div class="corr-ia">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">'
      +   '<div class="corr-note">✓ ' + (json ? json.note : '?') + ' / ' + pts + '</div>'
      +   '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">'
      +     '<span style="font-size:10px;color:#9090a8;">Cours</span>' + badge(json ? json.cours_su : '?')
      +     '<span style="font-size:10px;color:#9090a8;margin-left:6px;">Transfert</span>' + badge(json ? json.transfert : '?')
      +     '<span style="font-size:10px;color:#9090a8;margin-left:6px;">Méthode</span>' + badge(json ? json.methode : '?')
      +   '</div>'
      + '</div>'
      + (json && json.detail_bareme ? '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#f5a623;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">📊 Détail du barème</div><div style="background:rgba(245,166,35,.06);border-left:3px solid #f5a623;border-radius:0 6px 6px 0;padding:8px 13px;font-size:12px;color:#e8e8f0;font-family:monospace;line-height:1.8;">' + esc(json.detail_bareme) + '</div></div>' : '')
      + '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#e8c87a;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">📝 Résolution complète</div><div style="background:rgba(232,200,122,.06);border-left:3px solid #e8c87a;border-radius:0 6px 6px 0;padding:10px 13px;font-size:13px;color:#e8e8f0;line-height:1.7;white-space:pre-wrap;">' + esc(json ? (json.correction_experte||json.commentaire||'') : '') + '</div></div>'
      + '<div style="margin-bottom:10px;"><div style="font-size:10px;color:#5ecfb1;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">🔍 Analyse de ta réponse</div><div class="corr-txt" style="font-size:13px;">' + esc(json ? (json.analyse_eleve||json.commentaire||txt) : txt) + '</div></div>'
      + (json && json.pistes ? '<div><div style="font-size:10px;color:#9090a8;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">🎯 Pour progresser</div><div class="corr-conseil" style="font-size:13px;">' + esc(json.pistes) + '</div></div>' : '')
      + '</div>'
      + '<div class="corr-off"><strong>📖 CORRECTION OFFICIELLE</strong><br>' + esc(q.rep) + '</div>'
      + '<button class="btn-copy" onclick="copier(this)">📋 Copier</button>';

  } catch(err) {
    panel.innerHTML = '<div style="color:#e87a7a">❌ Erreur : ' + err.message + '</div>';
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function copier(btn) {
  var panel = btn.parentElement;
  var txt = panel.innerText;
  try {
    await navigator.clipboard.writeText(txt);
    btn.textContent = '✓ Copié';
    setTimeout(function() { btn.textContent = '📋 Copier'; }, 2000);
  } catch(e) {}
}

function exportPDF(sIdx) {
  var s = SUJETS[sIdx];
  var data = STORE[s.id];
  if (!data || !data.length) { alert("Corrige au moins une question d'abord."); return; }
  var totalObt = 0, totalMax = 0;
  data.forEach(function(c) {
    if (c.note != null) totalObt += parseFloat(c.note);
    totalMax += c.pts;
  });
  var html = '<html><head><meta charset="UTF-8"><style>'
    + 'body{font-family:Arial,sans-serif;font-size:13px;color:#111;padding:2rem;}'
    + 'h1{font-size:16px;border-bottom:2px solid #f5a623;color:#b87800;padding-bottom:6px;margin-bottom:16px;}'
    + 'h2{font-size:13px;margin-top:1.2rem;border-left:4px solid #f5a623;padding-left:8px;}'
    + '.q{margin-bottom:8px;font-style:italic;color:#555;}'
    + '.rep-ia{background:#fff9e6;border:1px solid #f5a623;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-eleve{background:#f0f0ff;border:1px solid #9090c8;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-detail{background:#f9f9f0;border:1px solid #c8c890;border-radius:6px;padding:6px 10px;margin:4px 0;font-size:12px;}'
    + '.rep-pistes{background:#fff8e6;border:1px solid #f5a623;border-radius:6px;padding:8px;margin:6px 0;}'
    + '.rep-off{background:#e6f9ee;border:1px solid #34c76b;border-radius:6px;padding:8px;margin:6px 0;font-size:12px;}'
    + '.score{font-size:18px;font-weight:bold;color:#b87800;margin:16px 0;}'
    + '</style></head><body>'
    + '<h1>📐 Corrections Maths — ' + s.annee + ' ' + s.session + '</h1>'
    + '<div class="score">Score : ' + totalObt.toFixed(1) + ' / ' + totalMax + '</div>';
  data.forEach(function(c) {
    html += '<h2>' + c.exo + ' — Q' + c.qi + (c.note != null ? ' (' + c.note + '/' + c.pts + ')' : '') + '</h2>'
      + '<div class="q"><strong>Question :</strong> ' + c.question + '</div>'
      + '<div class="rep-eleve"><strong>✏️ Réponse élève :</strong><br>' + (c.reponseEleve || '—') + '</div>'
      + (c.cours_su ? '<div class="rep-detail">📚 <strong>Cours :</strong> ' + c.cours_su + '</div>' : '')
      + (c.methode  ? '<div class="rep-detail">✏️ <strong>Méthode :</strong> ' + c.methode + '</div>' : '')
      + '<div class="rep-ia">🤖 <strong>Analyse IA :</strong><br>' + c.correctionIA + '</div>'
      + (c.pistes   ? '<div class="rep-pistes">🎯 <strong>Pistes :</strong> ' + c.pistes + '</div>' : '')
      + '<div class="rep-off">📖 <strong>Correction officielle :</strong><br>' + c.correctionOff + '</div>';
  });
  html += '</body></html>';
  var blob = new Blob([html], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'corrections_' + s.annee + '_' + s.session.replace(/[^a-z0-9]/gi,'_') + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.onload = buildGrid;
</script>
<script>
(function(){
  var KEY_TS='brevet_trial_start';
  var KEY_OK='brevet_access';
  var TRIAL=48*60*60*1000;
  function tick(){
    if(localStorage.getItem(KEY_OK)==='1')return;
    var ts=localStorage.getItem(KEY_TS);
    if(!ts){localStorage.setItem(KEY_TS,Date.now()+'');ts=Date.now();}
    else ts=parseInt(ts);
    var rem=TRIAL-(Date.now()-ts);
    if(rem<=0)return;
    var days=Math.ceil(rem/86400000);
    var el=document.getElementById('tbDays');
    if(el)el.textContent='J-'+days;
    document.getElementById('trial-banner').style.display='flex';
  }
  tick();
  setInterval(tick,60000);
})();
</script>
</body>
</html>
